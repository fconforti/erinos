name: Build ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare profile
        run: |
          mkdir -p iso/airootfs/root/erinos
          rsync -a \
            --exclude='.git' \
            --exclude='db/data' \
            --exclude='out' \
            --exclude='iso' \
            --exclude='dev' \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            ./ iso/airootfs/root/erinos/

      - name: Build ISO in Arch container
        run: |
          docker run --rm --privileged \
            -v "$PWD/iso:/profile:ro" \
            -v "$PWD/out:/out" \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm archiso &&
              mkarchiso -v -w /tmp/archiso-work -o /out /profile &&
              mv /out/erinos-*.iso /out/erinos.iso
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: erinos-${{ github.sha }}
          path: out/erinos.iso
          compression-level: 0

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            out/erinos.iso \
            --title "ErinOS ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
